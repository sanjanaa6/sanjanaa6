name: Update Quote of the Day

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 6am UTC
  workflow_dispatch: {}

jobs:
  update-quote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Insert random quote into README
        uses: piquark6046/random-quote-generator@master
        with:
          startComment: "<!-- QUOTE-START -->"
          endComment: "<!-- QUOTE-END -->"
          template: "> \"{quote}\"\n> — {author}"

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: update quote of the day"
          git push
