<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29">
        <animate attributeName="stop-color" values="#0f0c29;#302b63;#24243e;#0f0c29" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#302b63">
        <animate attributeName="stop-color" values="#302b63;#24243e;#0f0c29;#302b63" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#24243e">
        <animate attributeName="stop-color" values="#24243e;#0f0c29;#302b63;#24243e" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" />
      <stop offset="50%" stop-color="#A371F7" />
      <stop offset="100%" stop-color="#58A6FF" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="260" fill="url(#bgGrad)" rx="18" />

  <!-- floating dots -->
  <circle cx="100" cy="60" r="3" fill="#58A6FF" opacity="0.7">
    <animate attributeName="cy" values="60;40;60" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="220" cy="200" r="2.5" fill="#A371F7" opacity="0.6">
    <animate attributeName="cy" values="200;180;200" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1050" cy="70" r="3" fill="#58A6FF" opacity="0.7">
    <animate attributeName="cy" values="70;50;70" dur="4.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="980" cy="210" r="2" fill="#A371F7" opacity="0.6">
    <animate attributeName="cy" values="210;190;210" dur="3.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="600" cy="30" r="2.5" fill="#ffffff" opacity="0.4">
    <animate attributeName="cy" values="30;15;30" dur="5.5s" repeatCount="indefinite" />
  </circle>

  <!-- code brackets decoration -->
  <text x="60" y="150" font-family="Fira Code, monospace" font-size="70" fill="#58A6FF" opacity="0.15">&lt;/&gt;</text>
  <text x="1000" y="180" font-family="Fira Code, monospace" font-size="70" fill="#A371F7" opacity="0.15">{ }</text>

  <text x="600" y="120" text-anchor="middle" font-family="Fira Code, monospace" font-size="46" font-weight="700" fill="url(#textGrad)" filter="url(#glow)">
    Welcome to my GitHub
  </text>
  <text x="600" y="165" text-anchor="middle" font-family="Fira Code, monospace" font-size="20" fill="#c9d1d9" opacity="0.85">
    Building things, one commit at a time ✨
  </text>

  <rect x="470" y="190" width="260" height="2" fill="url(#textGrad)">
    <animate attributeName="width" values="0;260;0" dur="4s" repeatCount="indefinite" />
    <animate attributeName="x" values="600;470;600" dur="4s" repeatCount="indefinite" />
  </rect>
</svg>
